<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Altenpflege Flashcards</title><link rel="manifest" href="manifest.json"><style>body{font-family:Arial;background:#f6f1ff;padding:20px}.card{background:#fff;border-radius:20px;padding:40px;min-height:220px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer}button{margin:5px;padding:10px 15px}</style></head><body><h1>Flashcards Altenpflege</h1><div id=p></div><div class=card onclick='flip()' id=c></div><div><button onclick='prev()'>◀</button><button onclick='next()'>▶</button><button onclick='shuffle()'>🎲</button><button onclick='resetC()'>🔄</button></div><script>const cards=[{"question": "Zu welchem Zeitpunkt findet die Übergabe vom Nachtdienst an den Frühdienst statt?", "answer": "Vor Schichtbeginn um 7 Uhr morgens."}, {"question": "Welches Ziel verfolgt das Informationsgespräch mit dem Nachtdienst?", "answer": "Die Vermittlung von Vorkommnissen oder Besonderheiten aus der Nacht."}, {"question": "Warum ist das Wissen über den Zustand der Bewohner für die Pflegekraft wichtig?", "answer": "Es erleichtert die tägliche Arbeit und Interaktion für beide Seiten."}, {"question": "Wie wird die Aufgabenverteilung innerhalb eines Wohnbereichs zu Schichtbeginn geregelt?", "answer": "Das Team teilt sich auf und legt fest wer welche Bewohner oder Gruppen versorgt."}, {"question": "Was ist der Hauptgrund für die sorgfältige Vorbereitung des Pflegewagens?", "answer": "Die Vermeidung von unnötigen Wegen durch gute Planung."}, {"question": "Welche Materialien gehören standardmäßig auf einen Pflegewagen zur Zimmerversorgung?", "answer": "Bettwäsche Handtücher und benötigte Pflegeutensilien."}];let i=0,f=false;function render(){p.innerText=`Carte ${i+1}/${cards.length}`;c.innerText=f?cards[i].answer:cards[i].question}function flip(){f=!f;render()}function next(){if(i<cards.length-1)i++;f=false;render()}function prev(){if(i>0)i--;f=false;render()}function shuffle(){cards.sort(()=>Math.random()-.5);i=0;f=false;render()}function resetC(){i=0;f=false;render()}render();if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js');</script></body></html>
